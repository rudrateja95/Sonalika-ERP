</div>
    <table class="table table-hover align-middle mb-0">

<!-- ================= UPDATE CART MODAL ================= -->

<div class="modal fade" id="editCartModal" tabindex="-1">

    <div class="modal-dialog modal-lg modal-dialog-centered">

        <div class="modal-content">

            <!-- Header -->
            <div class="modal-header bg-warning text-dark">

                <h5 class="modal-title">
                    <i class="fas fa-edit"></i>
                    Update Cart Item
                </h5>

                <button type="button" class="close" data-dismiss="modal">
                    <span>&times;</span>
                </button>

            </div>

            <!-- Body -->
            <div class="modal-body p-4">

                <form id="editCartForm">

                    <!-- Hidden Cart ID -->
                    <input type="hidden" id="edit_cart_id">

                    <div class="row">

                        <!-- Style Number -->
                        <div class="col-md-6 mb-3">

                            <label class="font-weight-bold">
                                Style Number
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                data-role="edit_style_no"
                                readonly>

                        </div>

                        <!-- Quantity -->
                        <div class="col-md-6 mb-3">

                            <label class="font-weight-bold">
                                Quantity
                            </label>

                            <input
                                type="number"
                                class="form-control"
                                data-role="edit_qty"
                                min="1">

                        </div>

                    </div>

                    <div class="row">

                        <!-- Gold Color -->
                        <div class="col-md-6 mb-3">

                            <label class="font-weight-bold">
                                Gold Color
                            </label>

                            <select
                                class="form-control"
                                data-role="edit_gold_color">

                                <option>Yellow Gold</option>
                                <option>Rose Gold</option>
                                <option>White Gold</option>

                            </select>

                        </div>

                        <!-- Gold Purity -->
                        <div class="col-md-6 mb-3">

                            <label class="font-weight-bold">
                                Gold Purity
                            </label>

                            <select
                                class="form-control"
                                data-role="edit_gold_purity">

                                <option>9 KT</option>
                                <option>14 KT</option>
                                <option>18 KT</option>
                                <option>22 KT</option>

                            </select>

                        </div>

                    </div>

                    <div class="row">

                        <!-- Diamond Color -->
                        <div class="col-md-6 mb-3">

                            <label class="font-weight-bold">
                                Diamond Color
                            </label>

                            <select
                                class="form-control"
                                data-role="edit_diamond_color">

                                <option>EF</option>
                                <option>FG</option>
                                <option>GH</option>
                                <option>HI</option>
                                <option>IJ</option>

                            </select>

                        </div>

                        <!-- Diamond Clarity -->
                        <div class="col-md-6 mb-3">

                            <label class="font-weight-bold">
                                Diamond Clarity
                            </label>

                            <select
                                class="form-control"
                                data-role="edit_diamond_clarity">

                                <option>VVS</option>
                                <option>VS</option>
                                <option>SI</option>
                                <option>IJ</option>

                            </select>

                        </div>

                    </div>

                    <div class="mb-3">

                        <label class="font-weight-bold">
                            Remarks
                        </label>

                        <textarea
                            class="form-control"
                            rows="3"
                            data-role="edit_remarks"></textarea>

                    </div>

                </form>

            </div>

            <!-- Footer -->
            <div class="modal-footer">

                <button
                    type="button"
                    class="btn btn-secondary"
                    data-dismiss="modal">

                    Cancel

                </button>

                <button
                    type="button"
                    class="btn btn-warning"
                    onclick="updateCart()">

                    <i class="fas fa-save"></i>
                    Update Cart

                </button>

            </div>

        </div>

    </div>

</div>
