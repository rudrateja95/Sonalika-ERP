    <script>

fetch("/api/styles")
.then(response => response.json())
.then(products => {

    let html = "";

    products.forEach(product => {

        html += `
        <div class="col-lg-3 col-md-6 col-sm-12 pb-1">

            <div class="card product-item border-0 mb-4">

                <div class="card-header product-img position-relative overflow-hidden bg-transparent border p-0">

                    <img class="img-fluid"
                    src="data:image/jpeg;base64,${product.image}"
                    alt="${product.style_no}">

                </div>

                <div class="card-body border-left border-right text-center p-0 pt-4 pb-3">

                    <h6 class="text-truncate mb-3">${product.style_no}</h6>

                    <p class="mb-1">
                        <strong>${product.brand}</strong>
                    </p>

                    <small>
                        Gold : ${product.gold_wt} g<br>
                        Net : ${product.net_wt} g<br>
                        Diamond : ${product.dia_wt} ct<br>
                        Pieces : ${product.dia_pc}
                    </small>

                </div>

                <div class="card-footer d-flex justify-content-between bg-light border">

                    <a href="#" class="btn btn-sm text-dark">
                        <i class="fas fa-eye text-primary"></i> View
                    </a>

                    <a href="#" class="btn btn-sm text-dark">
                        <i class="fas fa-shopping-cart text-primary"></i> Add
                    </a>

                </div>

            </div>

        </div>
        `;
    });

    document.getElementById("products").innerHTML = html;

})
.catch(error => console.log(error));

</script>
