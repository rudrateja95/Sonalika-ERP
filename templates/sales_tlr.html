    <script>

let page = 1;
let loading = false;
let finished = false;

loadProducts();

async function loadProducts(){

    if(loading || finished) return;

    loading = true;

    document.getElementById("loader").style.display="block";

    const response = await fetch(`/api/styles?brand=TASO&category=ladies ring&page=${page}`);

    const data = await response.json();

    if(data.products.length==0){

        finished=true;

        document.getElementById("loader").innerHTML="<h6>No More Products</h6>";

        return;
    }

    let html="";

    data.products.forEach(product=>{

        html +=`

<div class="col-lg-3 col-md-6 col-sm-12 mb-4" >

    <div class="card h-100 shadow-sm border" >

        <!-- Image -->
        <div class="border-bottom bg-white text-center p-3" style="border-radius:20px;">

            <img
                src="data:image/jpeg;base64,${product.image}"
                alt="${product.style_no}"
                class="img-fluid"
                style="height:260px; object-fit:contain;">

        </div>

        <!-- Card Body -->
        <div class="card-body d-flex flex-column">

            <h5 class="text-center font-weight-bold mb-1">
                ${product.style_no}
            </h5>


            <table class="table table-bordered table-sm text-center mb-4">

                <tbody>

                    <tr>
                        <th>Gold</th>
                        <td>${product.gold_wt ?? "-"}</td>
                    </tr>

                    <tr>
                        <th>Net</th>
                        <td>${product.net_wt ?? "-"}</td>
                    </tr>

                    <tr>
                        <th>Diamond</th>
                        <td>${product.dia_wt ?? "-"}</td>
                    </tr>

                    <tr>
                        <th>Pieces</th>
                        <td>${product.dia_pc ?? "-"}</td>
                    </tr>

                </tbody>

            </table>

            <!-- Button always at bottom -->
            <div class="mt-auto">

                <a href="#"
                   class="btn btn-primary btn-block rounded-pill">

                    <i class="fas fa-shopping-cart mr-2"></i>

                    Order Now

                </a>

            </div>

        </div>

    </div>

</div>

        `;

    });

    document.getElementById("products").insertAdjacentHTML("beforeend",html);

    page++;

    loading=false;

    document.getElementById("loader").style.display="none";

}

window.addEventListener("scroll",()=>{

    if(window.innerHeight+window.scrollY>=document.body.offsetHeight-300){

        loadProducts();

    }

});

</script>
