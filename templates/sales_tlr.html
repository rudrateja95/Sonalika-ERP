    <style>
        .table td,
        .table th {
            padding: 6px;
            vertical-align: middle;
        }

        .card {
            border-radius: 12px;
        }

        .product-bg {
            background: url("") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            padding-top: 40px;
            padding-bottom: 40px;
        }

        .product-item {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            overflow: hidden;
        }

        h6 {
            color: whitesmoke
        }

        .image-box {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            background: #fff;
            text-align: center;
            padding: 15px;
        }

        .product-img {
            transition: 0.4s;
        }

        .image-overlay {

            position: absolute;
            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: rgba(0, 0, 0, .45);

            display: flex;
            justify-content: center;
            align-items: center;

            opacity: 0;
            transition: .3s;

        }

        .image-box:hover .image-overlay {
            opacity: 1;
        }

        .image-box:hover .product-img {
            transform: scale(1.05);
        }

        .image-overlay .btn {

            width: 55px;
            height: 55px;

            font-size: 22px;

        }

        .modal-content {
            border-radius: 20px;
        }

        .modal-header {
            padding: 20px 25px;
        }

        .modal-body {
            background: #fafafa;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 12px;
            transition: .3s;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 10px rgba(13, 110, 253, .2);
        }

        .btn {
            border-radius: 30px;
            transition: .3s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .modal-footer {
            background: #fff;
            border-top: 1px solid #eee;
        }

        @media(max-width:768px) {

            .modal-dialog {
                margin: .5rem;
            }

            .modal-body {
                padding: 20px;
            }

            .modal-footer {
                flex-direction: column;
            }

            .modal-footer .btn {
                width: 100%;
            }

        }

        .form-label {
            font-weight: 600;
            color: #495057;
            margin-bottom: 8px;
        }

        .form-select {
            height: 50px;
            border-radius: 12px;
        }

        .form-select:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 8px rgba(13, 110, 253, .15);
        }
    </style>

                <!-- Cart PopUp -->
                <div class="modal-body p-4">

                    <form id="selectForm">



                        <div id="orderContainer">

                            <div class="order-item">

                                    <!-- Style Number -->
                                    <div class="col-12 col-md-6 mb-4">

                                    </div>

                                            Quantity
                                        </label>

                                    </div>

                                </div>

                                <div class="row g-3 mb-3">

                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Diamond Clarity</label>

                                            <option>VVS</option>
                                            <option>VS</option>
                                            <option>SI</option>
                                            <option>IJ</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Diamond Color</label>

                                        <select class="form-select w-100" data-role="diamond_color">
                                            <option value="">Diamond Color</option>
                                            <option>EF</option>
                                            <option>FG</option>
                                            <option>GH</option>
                                            <option>HI</option>
                                            <option>IJ</option>
                                        </select>
                                    </div>

                                    <div class="col-md-6">

                                    </div>

                                    <div class="col-md-6">

                                            <option>9 KT</option>
                                            <option>14 KT</option>
                                            <option>18 KT</option>
                                            <option>22 KT</option>
                                        </select>
                                    </div>

                                </div>

                                <div class="mb-3">

                                </div>

                                <div class="text-end mb-3">

                                </div>
