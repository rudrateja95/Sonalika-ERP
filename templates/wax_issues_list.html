<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Wax Issues</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { font-size: 13px; }

.table th {
  white-space: nowrap;
}

.small-text {
  font-size: 12px;
}
</style>
</head>

<body class="p-3">

<h4 class="mb-3">Wax Issues List</h4>

<div class="table-responsive">
<table class="table table-bordered table-hover">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Issue Code</th>
<th>Date</th>
<th>Orders</th>
<th>Batch</th>
<th>Styles</th>
<th>Pieces</th>
<th>Gold</th>
<th>Diamond</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>
</div>

<script>

// ==========================
// LOAD DATA
// ==========================
async function loadWaxIssues() {
    try {
        const res = await fetch("/api/wax-issues-full");
        const result = await res.json();

        const data = result.data || [];
        let html = "";

        data.forEach(row => {

            // --------------------------
            // STYLES
            // --------------------------
            let styles = (row.styles || []).map(s =>
                `${s.style_no || ""} (${s.gold_color || ""} ${s.gold_purity || ""})`
            ).join("<br>");

            // --------------------------
            // GOLD
            // --------------------------
            let gold = (row.gold || []).map(g =>
                `${g.gold_kt || ""} - ${g.gold_gm || 0} gm`
            ).join("<br>");

            // --------------------------
            // DIAMOND
            // --------------------------
            let diamond = (row.diamond_text || []).join("<br>");

            // --------------------------
            // ROW HTML
            // --------------------------
            html += `
            <tr>
                <td>${row.id}</td>
                <td>${row.issue_code || row.id}</td>
                <td>${row.date || ""}</td>
                <td>${row.order_no || ""}</td>
                <td>${row.batch_no || ""}</td>

                <td class="small-text">${styles || "-"}</td>
                <td>${row.pieces || 0}</td>

                <td class="small-text">
                    ${gold || "-"}
                    <br><b>Total: ${row.total_gold_wt || 0}</b>
                </td>

                <td class="small-text">
                    ${diamond || "-"}
                    <br><b>${row.total_diamond_ct || 0} ct</b>
                </td>

                <td>
                    <button class="btn btn-sm btn-primary"
                        onclick="printIssue(${row.id})">
                        Print
                    </button>
                </td>
            </tr>
            `;
        });

        document.getElementById("tableBody").innerHTML = html;

    } catch (err) {
        console.error("Error loading data:", err);
    }
}

// LOAD ON PAGE
document.addEventListener("DOMContentLoaded", loadWaxIssues);


// ==========================
// PRINT FUNCTION
// ==========================
function printIssue(id) {
    if (!id) {
        alert("Invalid Issue ID");
        return;
    }

    // open print page
    window.open(`/print-wax-issue/${id}`, "_blank");
}

</script>

</body>
</html>
