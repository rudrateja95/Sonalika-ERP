<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Account - ERP</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">

  <link href="{{ url_for('static', filename='img/favicon.ico') }}" rel="icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

  <link href="{{ url_for('static', filename='lib/owlcarousel/assets/owl.carousel.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='lib/tempusdominus/css/tempusdominus-bootstrap-4.min.css') }}"
    rel="stylesheet">

  <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>

<body>
  <div class="container-fluid position-relative bg-white d-flex p-0">

    {% include 'account_menu.html' %}

    <div class="content">
      {% include 'navbar.html' %}


<div class="container-fluid pt-4 px-4">
        <div class="bg-light rounded p-4">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">Orders</h5>
            </div>

            <div class="table-responsive">

                <table class="table table-bordered table-hover align-middle">

                    <thead class="table" style="background-color: rgba(170, 170, 216, 0.664);text-align: center;" >
                        <tr>
                            <th>sl.no</th>
                            <th>Order No</th>
                            <th>Client ID</th>
                            <th>Total Qty</th>
                            <th>Total Styles</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody id="orderTable">
                        <tr>
                            <td colspan="6" class="text-center">
                                Loading...
                            </td>
                        </tr>
                    </tbody>

                </table>

            </div>

        </div>
    </div>

    <div class="modal fade" id="orderModal">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">

            <div class="modal-header">
                <h5>Order Details</h5>

                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <div class="table-responsive">

                    <table class="table table-bordered">

                        <thead>

                            <tr>

                                <th>Image</th>
                                <th>Style No</th>
                                <th>Qty</th>
                                <th>Gold Color</th>
                                <th>Purity</th>
                                <th>Dia Color</th>
                                <th>Dia Clarity</th>
                                <th>Remarks</th>
                                <th>Net Wt</th>
                                <th>Gross Wt</th>
                                <th>Gem Chart</th>

                            </tr>

                        </thead>

                        <tbody id="orderDetails"></tbody>

                    </table>

                </div>

            </div>

        </div>
    </div>
</div>

          {% include 'footer.html' %}
    </div>
  </div>

 <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

  <script src="{{ url_for('static', filename='lib/chart/chart.min.js') }}"></script>
  <script src="{{ url_for('static', filename='lib/easing/easing.min.js') }}"></script>
  <script src="{{ url_for('static', filename='lib/waypoints/waypoints.min.js') }}"></script>
  <script src="{{ url_for('static', filename='lib/owlcarousel/owl.carousel.min.js') }}"></script>

  <script src="{{ url_for('static', filename='lib/tempusdominus/js/moment.min.js') }}"></script>
  <script src="{{ url_for('static', filename='lib/tempusdominus/js/moment-timezone.min.js') }}"></script>
  <script src="{{ url_for('static', filename='lib/tempusdominus/js/tempusdominus-bootstrap-4.min.js') }}"></script>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/order_render.js') }}"></script>
  <script src="{{ url_for('static', filename='js/vieworder.js') }}"></script>

</body>

</html>
