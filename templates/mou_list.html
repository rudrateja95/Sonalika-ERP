              <!-- OWNER / DIRECTOR / PARTNER DETAILS -->

                  </thead>

                    <tr>
                    <td><input type="text" class="form-control" name="owner_name_1" id="owner_name"></td>
                    <td><input type="text" class="form-control" name="owner_pan_1" id="owner_pan"></td>

<select class="form-select shadow-sm" name="diamond_clarity">

<label class="form-label">Diamond Rate (-6.5)</label>

  <!-- GOLD LABOUR % -->
  <div class="card shadow-sm">
    <div class="section-title">Gold & Labour On Net Weight</div>

    <div class="card-body">

      <div class="row align-items-end">

        <!-- Percentage -->

          <label class="form-label">Percentage</label>
          <div class="input-group">
            <input type="number" name="gold_labour_percent" class="form-control" >

        <!-- View MOU Button -->

            <i class="fa fa-file-pdf me-1"></i> View MOU
          </a>
        </div>

       <center> <div class="text-center mt-4 no-print">
  <button class="btn btn-success" onclick="printMOU()">
    <i class="fa fa-print"></i> Print MOU
  </button>
</div></center>

      </div>

    </div>

      {% include 'footer.html' %}

  <!-- JS Libraries -->
<script>
document.addEventListener("DOMContentLoaded", function() {

    // --- Client Search Suggestions ---
    const clientInput = document.getElementById("clientCode");
    if (clientInput) {
        clientInput.addEventListener("input", function() {
            const term = this.value;
            if (term.length < 1) return;

            fetch("/search-client-suggestions", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ term: term })
            })
            .then(res => res.json())
            .then(data => {
                const datalist = document.getElementById("clientList");
                datalist.innerHTML = "";
                data.forEach(code => {
                    const option = document.createElement("option");
                    option.value = code;
                    datalist.appendChild(option);
                });
            })
            .catch(err => console.error("Suggestion error:", err));
        });
    }

    // --- Search Client Button ---
    const searchBtn = document.getElementById("searchClientBtn");
    if (searchBtn) {
        searchBtn.addEventListener("click", function() {
            const clientCode = document.getElementById("clientCode").value;
            if (!clientCode) {
                alert("Please enter a client code");
                return;
            }

            // Fetch KYC
            fetch("/search-client-kyc", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ client_code: clientCode })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "not_found") {
                    alert("Client Not Found");
                    return;
                }

                // Fill client fields safely
                const fields = ["company_name", "gst_number", "company_pan", "address"];
                fields.forEach(f => {
                    const el = document.querySelector(`[name='${f}']`);
                    if (el) el.value = data[f] || "";
                });

                // Populate owners table
                loadOwners(data);
            })
            .catch(err => console.error("Error fetching KYC:", err));

            // Fetch MOU
            fetch("/fetch-client-mou", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ client_code: clientCode })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "client_not_found") {
                    alert("Client Not Found");
                    return;
                }
                if (data.status === "mou_not_found") {
                    alert("MOU Not Created");
                    return;
                }

                const mouFields = [
                    "gold_credit_days", "labour_credit_days", "diamond_credit_days",
                    "chain_credit_days", "certificate_hallmark_days", "making_charges",
                    "chain_charges", "synthetic_stone_charges", "minimum_labour_rule",
                    "nose_pin_labour", "gold_labour_percent", "diamond_clarity",
                    "diamond_color", "diamond_rate_2", "diamond_rate_6_5", "diamond_rate_11"
                ];

                mouFields.forEach(f => {
                    const el = document.querySelector(`[name='${f}']`);
                    if (el) el.value = data[f] || "";
                });

                const btn = document.getElementById("mou_view_btn");
                if (btn && data.mou_view_url) {
                    btn.style.display = "block";
                    btn.href = data.mou_view_url;
                }
            })
            .catch(err => console.error("Error fetching MOU:", err));
        });
    }

    // --- Owners Table Renderer ---
    function loadOwners(data) {
        const tbody = document.getElementById("ownersTableBody");
        if (!tbody) return;

        tbody.innerHTML = "";

        if (!data.owners || data.owners.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">No Owners Found</td></tr>`;
            return;
        }

        data.owners.forEach((owner, index) => {
            const row = `
                <tr>
                    <td><input type="text" class="form-control" name="owner_name_${index+1}" value="${owner.full_name || ''}"></td>
                    <td><input type="text" class="form-control" name="owner_pan_${index+1}" value="${owner.pan_number || ''}"></td>
                    <td><input type="text" class="form-control" name="owner_aadhaar_${index+1}" value="${owner.aadhar_number || ''}"></td>
                    <td><input type="text" class="form-control" name="owner_contact_${index+1}" value="${owner.phone_number || ''}"></td>
                    <td><input type="email" class="form-control" name="owner_email_${index+1}" value="${owner.email_id || ''}"></td>
                </tr>
            `;
            tbody.insertAdjacentHTML("beforeend", row);
        });
    }

});
</script>

<script>
  function printMOU() {
    const clientCode = document.getElementById("clientCode").value;

    if(!clientCode){
        alert("Enter Client Code");
        return;
    }

    window.open("/mou-print?client_code=" + clientCode, "_blank");
}
</script>
