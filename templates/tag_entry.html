<script>

    // Generate Tag Numbers
    function updateTagNumbers() {
        const rows = document.querySelectorAll("#tagTable tr");

        rows.forEach((row, index) => {
            const tagInput = row.querySelector(".tagNo");
            if (tagInput) {
                tagInput.value = "SJ-" + (index + 1);
            }
        });
    }

    // Add New Row
    function addRow() {

        const tbody = document.getElementById("tagTable");
        const newRow = tbody.rows[0].cloneNode(true);

        // Clear inputs
        newRow.querySelectorAll("input").forEach(input => {
            input.value = "";
        });

        // Reset dropdowns
        newRow.querySelectorAll("select").forEach(select => {
            select.selectedIndex = 0;
        });

        tbody.appendChild(newRow);

        updateTagNumbers();
    }

    // Remove Row
    function removeThisRow(btn) {

        const tbody = document.getElementById("tagTable");

        if (tbody.rows.length > 1) {

            btn.closest("tr").remove();

            updateTagNumbers();

        } else {

            alert("At least one row must remain.");

        }
    }

    // Page Load
    document.addEventListener("DOMContentLoaded", function () {

        updateTagNumbers();

    });

    // Auto Add Row on Net Weight Enter
    document.addEventListener("keydown", function (e) {

        if (e.key !== "Enter") return;

        if (!e.target.classList.contains("netWt")) return;

        e.preventDefault();

        const row = e.target.closest("tr");
        const tbody = document.getElementById("tagTable");

        // Only add a row if current row is the last one
        if (row === tbody.rows[tbody.rows.length - 1]) {

            addRow();

        }

        // Focus Design No of the new last row
        const lastRow = tbody.rows[tbody.rows.length - 1];

        lastRow.cells[1].querySelector("input").focus();

    });

    document.addEventListener("wheel", function (e) {
        if (document.activeElement.type === "number") {
            e.preventDefault();
        }
    }, { passive: false });

</script>
   <!-- key board Functions --> 
    <script>
        document.addEventListener("keydown", function (e) {

            if (!e.target.classList.contains("cell")) return;

            const current = e.target;
            const row = current.closest("tr");

            const rows = [...document.querySelectorAll("#tagTable tr")];

            const rowIndex = rows.indexOf(row);

            const cols = [...row.querySelectorAll(".cell")];

            const colIndex = cols.indexOf(current);

            let target = null;

            switch (e.key) {

                case "Enter":
                case "ArrowRight":
                    e.preventDefault();

                    if (colIndex + 1 < cols.length) {
                        target = cols[colIndex + 1];
                    }
                    break;

                case "ArrowLeft":
                    e.preventDefault();

                    if (colIndex > 0) {
                        target = cols[colIndex - 1];
                    }
                    break;

                case "ArrowDown":
                    e.preventDefault();

                    if (rowIndex + 1 < rows.length) {
                        target = rows[rowIndex + 1]
                            .querySelectorAll(".cell")[colIndex];
                    }
                    break;

                case "ArrowUp":
                    e.preventDefault();

                    if (rowIndex > 0) {
                        target = rows[rowIndex - 1]
                            .querySelectorAll(".cell")[colIndex];
                    }
                    break;
            }

            if (target) {
                target.focus();
                target.select?.();
            }

        });
        document.addEventListener("input", async function (e) {

            if (!e.target.classList.contains("designNo")) return;

            const q = e.target.value.trim();

            if (q.length < 1) return;

            const res = await fetch("/api/style-search?q=" + encodeURIComponent(q));
            const styles = await res.json();

            const list = document.getElementById("styleList");
            list.innerHTML = "";

            styles.forEach(style => {
                list.innerHTML += `<option value="${style}">`;
            });

        });
    </script>

<!-- send data to print-tag -->
<script>
    function printAllTags() {

    const rows = document.querySelectorAll("#tagTable tr");

    let tags = [];

    rows.forEach(row => {

        tags.push({
            tag: row.cells[0].querySelector("input").value,
            design: row.cells[1].querySelector("input").value,
            purity: row.cells[2].querySelector("select").value,
            clarity: row.cells[3].querySelector("select").value,
            color: row.cells[4].querySelector("select").value,
            gross: row.cells[5].querySelector("input").value,
            diawt: row.cells[6].querySelector("input").value,
            diapc: row.cells[7].querySelector("input").value,
            stonewt: row.cells[8].querySelector("input").value,
            stonepc: row.cells[9].querySelector("input").value,
            net: row.cells[10].querySelector("input").value
        });

    });

    localStorage.setItem("printTags", JSON.stringify(tags));

    window.open("/print-tag");
}
</script>
