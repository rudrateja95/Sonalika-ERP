  <!-- ADD EMPLOYEE CARD -->

          <div class="col-md-3">
            <select class="form-control" data-role="role">
              <option value="">Select Role</option>

              <option>FILLING EP</option>
              <option>FINAL FILLING</option>
              <option>POLISHING EP</option>
              <option>PRE POLISHING</option>
              <option>SETTING</option>
              <option>DIAMOND/STONE WEIGHT</option>
              <option>FINAL POLISHING</option>
              <option>IGI/HM/DIA.WT./QC</option>

      <button class="btn btn-primary mt-2 w-100" onclick="saveEmployees()">

</div>

  <!-- JS Libraries -->


<script>

// ADD ROW
function addEmployeeRow() {

  const container = document.getElementById("employeeContainer");

  const row = document.createElement("div");
  row.className = "row g-2 mb-2 emp-row";

  row.innerHTML = `
    <div class="col-md-3">
      <input type="text" class="form-control" placeholder="Employee Name" data-role="name">
    </div>

    <div class="col-md-3">
      <input type="text" class="form-control" placeholder="Phone" data-role="phone">
    </div>

<div class="col-md-3">
  <select class="form-control" data-role="role" required>
    <option value="">Select Role</option>
    <option>PRE FILLING</option>
    <option>FILLING EP</option>
    <option>FINAL FILLING</option>
    <option>POLISHING EP</option>
    <option>PRE POLISHING</option>
    <option>SETTING</option>
    <option>DIAMOND/STONE WEIGHT</option>
    <option>FINAL POLISHING</option>
    <option>IGI/HM/DIA.WT./QC</option>
    <option>TAGING/PACKING/BILLING</option>
  </select>
</div>

    <div class="col-md-3">
      <button class="btn btn-danger w-100" onclick="removeEmployeeRow(this)">-</button>
    </div>
  `;

  container.appendChild(row);
}


// REMOVE ROW
function removeEmployeeRow(btn) {
  btn.closest(".emp-row").remove();
}


// SAVE JSON
async function saveEmployees() {

  const rows = document.querySelectorAll(".emp-row");

  let employees = [];

  rows.forEach(r => {

    const name = r.querySelector("[data-role='name']").value;
    const phone = r.querySelector("[data-role='phone']").value;
    const role = r.querySelector("[data-role='role']").value;

    if (name) {
      employees.push({ name, phone, role });
    }
  });

  if (!employees.length) {
    alert("Enter at least one employee");
    return;
  }

  const res = await fetch("/api/employees", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ employees })
  });

  const data = await res.json();

  if (data.ok) {
    alert("Saved Successfully");
    location.reload();
  } else {
    alert("Error saving");
  }
}

</script>
<script>

// LOAD EMPLOYEES
async function loadEmployees() {

  const tbody = document.getElementById("employeeTableBody");

  try {
    const res = await fetch("/api/employees");
    const data = await res.json();

    if (!data.ok || !data.employees.length) {
      tbody.innerHTML = `<tr><td colspan="5">No employees</td></tr>`;
      return;
    }

    tbody.innerHTML = data.employees.map(e => `
      <tr>
        <td>${e.emp_code}</td>
        <td>${e.name}</td>
        <td>${e.phone}</td>
        <td>${e.role}</td>
        <td>
          <button class="btn btn-sm btn-danger"
            onclick="deleteEmployee(${e.id})">
            Delete
          </button>
        </td>
      </tr>
    `).join("");

  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="5">Error</td></tr>`;
  }
}


// DELETE
async function deleteEmployee(id) {

  if (!confirm("Delete this employee?")) return;

  const res = await fetch(`/api/employees/${id}`, {
    method: "DELETE"
  });

  const data = await res.json();

  if (data.ok) {
    loadEmployees();
  } else {
    alert("Delete failed");
  }
}


// LOAD ON PAGE START
document.addEventListener("DOMContentLoaded", loadEmployees);

</script>
