<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Wax Issue Print</title>

<style>
@page {
  size: A4;
  margin: 10mm;
}

body {
  font-family: Arial;
  font-size: 12px;
}

h3, h4 {
  text-align: center;
  margin: 5px 0;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 10px;
}

td, th {
  border: 1px solid #000;
  padding: 5px;
}

.center { text-align: center; }
.bold { font-weight: bold; }

@media print {
  body { margin: 0; }
}
</style>
</head>

<body>

<div id="printArea"></div>

<script>

const issueId = window.location.pathname.split("/").pop();

fetch(`/api/wax-issue/${issueId}`)
.then(res => res.json())
.then(data => {

let html = `

<h3>SONALIKA JEWELLERS</h3>
<h4>WAX ISSUE</h4>

<table>
<tr><td class="bold">Issue Code</td><td>${data.issue_code}</td></tr>
<tr><td class="bold">Date</td><td>${data.date}</td></tr>
<tr><td class="bold">Order No</td><td>${data.orders.join(", ")}</td></tr>
<tr><td class="bold">Total Pieces</td><td>${data.pieces}</td></tr>
<tr><td class="bold">Total Gold</td><td>${data.total_gold}</td></tr>
</table>

<h4>Styles</h4>
<table>
<tr>
<th>Style</th>
<th>Gold Color</th>
<th>Purity</th>
</tr>
`;

data.styles.forEach(s => {
html += `
<tr>
<td>${s.style_no}</td>
<td>${s.gold_color}</td>
<td>${s.gold_purity}</td>
</tr>
`;
});

html += `</table>`;

html += `
<h4>Gold Details</h4>
<table>
<tr>
<th>Gold GM</th>
<th>KT</th>
<th>Color</th>
<th>Pieces</th>
</tr>
`;

data.gold.forEach(g => {
html += `
<tr>
<td>${g.gold_gm}</td>
<td>${g.gold_kt}</td>
<td>${g.color || ""}</td>
<td>${g.pcs || ""}</td>
</tr>
`;
});

html += `</table>`;

// SIGN
html += `
<br><br>
<table>
<tr>
<td class="center">Authorized Signature</td>
</tr>
</table>
`;

document.getElementById("printArea").innerHTML = html;

setTimeout(() => {
    window.print();
}, 500);

});

</script>

</body>
</html>
